on:
  push:
    branches: [main]

jobs:
  deploy: 
    name: Deploy 
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build the app
        run: ./scripts/buildprod.sh

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: setup-gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 416.0.0'

      - name: Use gcloud CLI
        run: gcloud info

      - name: Push image to Google Artifact Registry
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-503016/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely \
               --image us-central1-docker.pkg.dev/notely-503016/notely-ar-repo/notely:latest \
               --region us-central1 \
               --allow-unauthenticated \
               --project notely-503016 \
               --max-instances=4 
